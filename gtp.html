<!DOCTYPE html>
<html>
<head>
    <title>ChatGPT API Example</title>
</head>
<body>
    <h1>ChatGPT API Example</h1>

    <div id="chatContainer">
        <div id="chatHistory"></div>
        <div>
            <input type="text" id="userInput" placeholder="Type your message here...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const userInput = document.getElementById('userInput').value;

            if (!userInput.trim()) {
                alert('Please enter a message.');
                return;
            }

            displayMessage(userInput, 'user');
            document.getElementById('userInput').value = ''; // Clear input box after sending

            const response = await fetch('https://api.openai.com/v1/engines/davinci/completions', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer 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',
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    prompt: userInput,
                    max_tokens: 150,
                }),
            });

            const data = await response.json();
            displayMessage(data.choices[0].text, 'bot');
        }

        function displayMessage(message, sender) {
            const chatHistoryDiv = document.getElementById('chatHistory');
            const messageWrapperDiv = document.createElement('div');
            const messageDiv = document.createElement('div');

            messageWrapperDiv.classList.add('messageWrapper', sender === 'user' ? 'user' : 'bot');
            messageDiv.classList.add('message');

            messageDiv.innerText = message;
            messageWrapperDiv.appendChild(messageDiv);
            chatHistoryDiv.appendChild(messageWrapperDiv);

            // Scroll to the bottom to always show the latest message
            chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
        }
    </script>

    <style>
        /* Styles for the chat container and messages */
        #chatContainer {
            display: flex;
            flex-direction: column;
            height: 80vh;
            justify-content: space-between;
            padding: 20px;
        }

        .messageWrapper {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .user {
            justify-content: flex-end;
        }

        .message {
            margin: 5px;
            padding: 8px;
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user .message {
            background-color: lightblue;
            align-self: flex-end;
        }

        .bot .message {
            background-color: lightgreen;
        }

        input[type="text"] {
            width: 70%;
            padding: 8px;
            margin-right: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            padding: 8px 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            background-color: #007bff;
            color: white;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</body>
</html>
