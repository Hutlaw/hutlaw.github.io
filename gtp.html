<!DOCTYPE html>
<html>
<head>
    <title>ChatGPT API Example</title>
</head>
<body>
    <h1>ChatGPT API Example</h1>

    <div id="chatContainer">
        <div id="chatHistory"></div>
        <div>
            <textarea id="userInput" rows="5" cols="50"></textarea>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const userInput = document.getElementById('userInput').value;

            if (!userInput.trim()) {
                alert('Please enter a message.');
                return;
            }

            displayMessage(userInput, 'user');
            document.getElementById('userInput').value = ''; // Clear input box after sending

            const response = await fetch('https://api.openai.com/v1/engines/davinci/completions', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer 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',
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    prompt: userInput,
                    max_tokens: 150,
                }),
            });

            const data = await response.json();
            displayMessage(data.choices[0].text, 'bot');
        }

        function displayMessage(message, sender) {
            const chatHistoryDiv = document.getElementById('chatHistory');
            const messageDiv = document.createElement('div');

            messageDiv.classList.add('message', sender);
            messageDiv.innerHTML = `<p>${message}</p>`;

            chatHistoryDiv.appendChild(messageDiv);

            // Scroll to the bottom to always show the latest message
            chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
        }
    </script>

    <style>
        /* Styles for the chat container and messages */
        #chatContainer {
            display: flex;
            flex-direction: column;
            height: 80vh;
            justify-content: space-between;
        }

        .message {
            margin: 10px;
            padding: 8px;
            border-radius: 5px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user {
            background-color: lightblue;
            text-align: right;
        }

        .bot {
            background-color: lightgreen;
            text-align: left;
        }
    </style>
</body>
</html>
