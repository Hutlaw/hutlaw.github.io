<!DOCTYPE html>
<html>
<head>
    <title>ChatGPT API Example</title>
</head>
<body>
    <h1>ChatGPT API Example t2</h1>

    <div>
        <textarea id="userInput" rows="5" cols="50"></textarea>
        <button onclick="sendMessage()">Send</button>
    </div>

    <div id="chatHistory"></div>

    <script>
        async function getBotResponse(userInput) {
    const response = await fetch('https://api.openai.com/v1/engines/davinci/completions', {
        method: 'POST',
        headers: {
            'Authorization': 'Bearer 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',
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            prompt: userInput,
            max_tokens: 150,
        }),
    });

    const data = await response.json();
    console.log(data); // Add this line to log the API response

    return data.choices[0].text;
}


        function displayMessage(message, sender) {
            const chatHistoryDiv = document.getElementById('chatHistory');
            const messageDiv = document.createElement('div');

            messageDiv.classList.add('message', sender === 'user' ? 'user' : 'bot');
            messageDiv.innerText = message;

            chatHistoryDiv.appendChild(messageDiv);

            // Scroll to the bottom to always show the latest message
            chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
        }
    </script>

    <style>
        .message {
            margin: 10px;
            padding: 8px;
            border-radius: 5px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user {
            background-color: lightblue;
            text-align: right;
        }

        .bot {
            background-color: lightgreen;
            text-align: left;
        }

        textarea {
            width: calc(100% - 70px); /* Adjust this value according to your layout */
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            background-color: #007bff;
            color: white;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</body>
</html>
