<!DOCTYPE html>
<html>
<head>
    <title>ChatGPT API Example</title>
</head>
<body>
    <h1>ChatGPT API Example</h1>

    <div>
        <textarea id="userInput" rows="5" cols="50"></textarea>
        <button onclick="getResponse()">Send</button>
    </div>

    <div id="response"></div>

    <script>
        async function getResponse() {
            const userInput = document.getElementById('userInput').value;

            const response = await fetch('https://api.openai.com/v1/engines/davinci/completions', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer 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',
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    prompt: userInput,
                    max_tokens: 150,
                }),
            });

            const data = await response.json();
            displayResponse(data.choices[0].text);
        }

        function displayResponse(responseText) {
            const responseDiv = document.getElementById('response');
            responseDiv.innerHTML = "<p>" + responseText + "</p>";
        }
    </script>
</body>
</html>
